<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký | Website Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .tab-buttons {
            display: flex;
            background: #eee;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #764ba2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .avatar-upload {
            text-align: center;
            margin-bottom: 20px;
        }

        #avatar-preview {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid #764ba2;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            background: #764ba2;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #5a3a8a;
            transform: translateY(-2px);
        }

        #authStatus {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Khi đã đăng nhập */
        .logged-in-box {
            text-align: center;
        }
        .logged-in-box img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div id="loginSection">
        <div class="login-header">
            <h1>Chào mừng bạn!</h1>
            <p style="color: #888; font-size: 14px;">Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" id="showLogin">Đăng nhập</button>
            <button class="tab-btn" id="showRegister">Đăng ký</button>
        </div>

        <form id="authForm">
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tên tài khoản" required>
            </div>

            <div class="input-group" id="emailGroup" style="display: none;">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@gmail.com">
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div id="registerExtra" style="display: none;">
                <div class="avatar-upload">
                    <img id="avatar-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar">
                    <label for="avatarFile" style="display: block; cursor: pointer; color: #764ba2; font-size: 13px; font-weight: 600;">Chọn ảnh đại diện</label>
                    <input type="file" id="avatarFile" accept="image/*" style="display: none;">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Đăng nhập</button>
        </form>

        <div id="authStatus"></div>
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #666; text-decoration: none; font-size: 13px;">← Quay lại Trang chủ</a>
        </div>
    </div>

    <div id="loggedInSection" style="display: none;" class="logged-in-box">
        <h1>Xin chào!</h1>
        <img id="userAvatar" src="" alt="Avatar">
        <h2 id="displayUser">Tên người dùng</h2>
        <p id="displayEmail" style="color: #666; margin-bottom: 25px;"></p>
        <button class="submit-btn" style="background: #ff4757;" onclick="handleLogout()">Đăng xuất</button>
        <div style="margin-top: 15px;">
            <a href="index.html" style="color: #764ba2; text-decoration: none; font-weight: 600;">Vào xem video ngay →</a>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="login.js"></script>
<script>
    // Xử lý chuyển tab nội bộ (cho đẹp)
    const showLogin = document.getElementById('showLogin');
    const showRegister = document.getElementById('showRegister');
    const emailGroup = document.getElementById('emailGroup');
    const registerExtra = document.getElementById('registerExtra');
    const submitBtn = document.getElementById('submitBtn');

    showLogin.onclick = () => {
        showLogin.classList.add('active');
        showRegister.classList.remove('active');
        emailGroup.style.display = 'none';
        registerExtra.style.display = 'none';
        submitBtn.textContent = 'Đăng nhập';
        isLoginMode = true;
    };

    showRegister.onclick = () => {
        showRegister.classList.add('active');
        showLogin.classList.remove('active');
        emailGroup.style.display = 'block';
        registerExtra.style.display = 'block';
        submitBtn.textContent = 'Tham gia ngay';
        isLoginMode = false;
    };

    // Preview ảnh đại diện
    document.getElementById('avatarFile').onchange = function() {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('avatar-preview').src = e.target.result;
            };
            reader.readAsDataURL(this.files[0]);
        }
    };
</script>

</body>
</html>
