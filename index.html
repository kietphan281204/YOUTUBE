<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng Video</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <header style="display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: #fff; border-bottom: 1px solid #eee; height: 56px;">
        <div style="display: flex; align-items: center; cursor: pointer; gap: 8px;" onclick="window.location.href='index.html'">
            <div style="display: flex; height: 32px; border-radius: 6px; overflow: hidden; border: 2px solid #000;">
                <div style="background: #000; width: 32px; display: flex; align-items: center; justify-content: center;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M12.525.02c1.31 0 2.57.17 3.77.47v4.46a7.02 7.02 0 0 1-3.77-1.12v9.33a5.55 5.55 0 1 1-5.55-5.55c.34 0 .66.03.98.08V3.12a8.6 8.6 0 0 0-.98-.05c-4.75 0-8.6 3.85-8.6 8.6s3.85 8.6 8.6 8.6 8.6-3.85 8.6-8.6V0h-3.05z"/></svg>
                </div>
                <div style="background: #ff0000; width: 32px; display: flex; align-items: center; justify-content: center;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
                </div>
            </div>
            <h1 style="font-size: 22px; font-weight: 900; margin: 0; letter-spacing: -1.5px; font-family: 'Arial Black', sans-serif;">
                <span style="color: #000;">TIK</span><span style="color: #ff0000;">TUBE</span>
            </h1>
        </div>
        <div class="headerSearch" style="display:flex; gap: 8px; flex: 1; max-width: 400px; margin: 0 20px;">
            <input type="text" id="searchInput" placeholder="Tìm bằng tiêu đề, #tag..."
                style="flex:1; padding: 6px 12px; border-radius: 20px; border: 1px solid #ccc; outline: none;">
            <button onclick="handleSearch()" style="background: #555; color: white; border-radius: 20px; padding: 6px 16px; border: none; cursor: pointer;">Tìm</button>
        </div>
        <div class="headerActions">
            <button id="homeBtn" onclick="window.location.href='index.html'">Trang chủ</button>
            <button id="uploadPageBtn" onclick="window.location.href='upload.html'" style="display:none;">Đăng Video</button>
            <button id="historyBtn" onclick="window.location.href='history.html'" style="display:none;">Lịch sử</button>
            <button id="subsPageBtn" onclick="window.location.href='subscriptions.html'" style="display:none;">Đăng ký</button>
            <button id="loginPageBtn">Tài khoản</button>
        </div>
    </header>

    <main>
        <div id="authStatus"></div>
        <div id="status"></div>

        <div class="trendingSection">
            <h2>Video xu hướng</h2>
            <p class="trendingHint"></p>
            <div id="trendingStatus"></div>
            <div id="trendingContainer"></div>
        </div>

        <div id="categoryFilterBar" class="category-filter-bar">
            <button class="category-btn active" onclick="filterByCategory(null, this)">Tất cả</button>
        </div>
        <h2 id="feedTitle" style="margin-top:16px;">Video mới</h2>
        <div id="videoContainer"></div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
