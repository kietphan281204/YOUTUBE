<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi tiết video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Website Video</h1>
        <div class="headerActions">
            <button type="button" id="backBtn">← Trang chủ</button>
            <button type="button" id="loginPageBtn">Đăng nhập</button>
        </div>
    </header>

    <main class="videoDetailMain">
        <div id="detailStatus"></div>

        <article id="videoDetail">
            <h2 id="detailTitle" style="font-size: 1.8rem; margin-bottom: 15px;">Đang tải…</h2>
            <div id="detailMeta" class="videoMeta" style="margin-bottom: 25px;"></div>
            
            <video id="detailVideo" controls playsinline></video>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 24px 0; background: #f8fafc; padding: 20px; border-radius: 16px;">
                <div class="likeRow" style="margin-top: 0;">
                    <button type="button" id="likeBtn" class="likeBtn">👍 Thích</button>
                    <span id="likeCount" class="likeCount" style="font-weight: 600; color: var(--text-main);">0 lượt thích</span>
                </div>
                <div class="stats-bar" style="margin: 0;">
                    <span>👁️ <span id="viewCount">0</span> lượt xem</span>
                </div>
            </div>

            <div class="videoDescription-wrap" style="background: white; border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 30px;">
                <h4 style="margin-top: 0; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">Mô tả video</h4>
                <p id="detailDescription" class="videoDescription" style="-webkit-line-clamp: unset; display: block;"></p>
            </div>
        </article>

        <section class="commentsSection">
            <h3>Bình luận</h3>
            <div id="commentList" class="commentList"></div>
            <div id="commentFormWrap" class="commentFormWrap">
                <textarea id="commentInput" rows="3" placeholder="Viết bình luận…" maxlength="1000"></textarea>
                <button type="button" id="sendCommentBtn">Gửi bình luận</button>
            </div>
            <p id="commentHint" class="commentHint"></p>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="video.js"></script>
</body>
</html>
