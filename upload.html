<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng Video</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Website Video</h1>
        <div class="headerActions">
            <button id="homeBtn" onclick="window.location.href='index.html'">Trang chủ</button>
            <button id="uploadPageBtn" onclick="window.location.href='upload.html'" style="display:none;">Đăng
                Video</button>
            <button id="historyBtn" onclick="window.location.href='history.html'" style="display:none;">Lịch sử
                video</button>
            <button id="loginPageBtn">Tài khoản</button>
        </div>
    </header>

    <main>
        <div id="authStatus"></div>

        <div class="upload-container">
            <h2 style="margin-top: 0; color: var(--primary);">Đăng Video Mới</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;">Chia sẻ khoảnh khắc của bạn với
                mọi người</p>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">Tiêu đề
                    video</label>
                <input type="text" id="titleInput" placeholder="Nhập tiêu đề hấp dẫn...">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">Danh mục</label>
                <select id="categoryInput" onchange="onCategoryChange()">
                    <option value="">-- Chọn danh mục phù hợp --</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">Mô tả chi
                    tiết</label>
                <textarea id="descriptionInput" name="mo_ta" placeholder="Mô tả nội dung video của bạn..."
                    rows="4"></textarea>
            </div>

            <div id="tagSuggestContainer" style="margin-bottom: 24px; display: none;">
                <div style="font-size:0.85rem; color: var(--text-muted); margin-bottom:10px;">Gợi ý thẻ tag (nhấp để
                    thêm):</div>
                <div id="tagButtons" style="display:flex; flex-wrap:wrap; gap:8px;"></div>

                <div style="margin-top: 16px; display: flex; gap: 8px;">
                    <input type="text" id="customTagInput" placeholder="Thêm tag tự chọn (VD: #gamehay)">
                    <button type="button" onclick="addCustomTag()">Thêm</button>
                </div>
            </div>

            <div
                style="margin-bottom: 30px; padding: 30px; border: 2px dashed var(--border); border-radius: 16px; text-align: center; background: #fcfcfc;">
                <input type="file" id="videoInput" accept="video/*" style="margin-bottom: 0;">
            </div>

            <button id="uploadBtn" onclick="uploadVideo()" style="width: 100%; padding: 14px;">Bắt đầu tải lên</button>
            <div id="status" style="margin-top:20px; text-align: center;"></div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
